name: Keep HF Space awake

# Free-tier Spaces sleep after 48h without traffic. A ping twice a day
# resets that timer (two per day so one failed run still leaves margin).
on:
  schedule:
    - cron: "17 6,18 * * *"  # 06:17 and 18:17 UTC daily
  workflow_dispatch: {}      # allow manual runs for testing

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping all Spaces
        run: |
          spaces=(
            "https://gibsonghf-greg-digital-twin.hf.space/"
            "https://gibsonghf-ai-article-writer.hf.space/"
            "https://gibsonghf-netflix-rag.hf.space/"
          )

          failed=0

          for space in "${spaces[@]}"; do
            code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 120 "$space")
            echo "$space responded with HTTP $code"

            if [ "$code" != "200" ]; then
              failed=1
            fi
          done

          exit $failed
